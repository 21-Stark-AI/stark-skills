name: Graph Audit

on:
  schedule:
    - cron: "0 9 * * 1"
  workflow_dispatch:

jobs:
  audit:
    name: Weekly graph audit
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      issues: write
    env:
      REPO_NAME: ${{ github.repository }}
      WORKDIR: .stark-graph/audit-${{ github.run_id }}
    steps:
      - name: Checkout main
        uses: actions/checkout@692973e3d937129bcbf40652eb9f2f61becf3332
        with:
          ref: main
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@42375524e23c412d93fb67b49958b491fce71c38
        with:
          python-version: "3.12"

      - name: Install graph dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r scripts/requirements-graph.txt

      - name: Run audit
        run: |
          python scripts/stark_graph.py \
            --repo . \
            --repo-name "$REPO_NAME" \
            --stage audit \
            --warn \
            --workdir "$WORKDIR"

      - name: Run validation for artifact parity
        run: |
          python scripts/stark_graph.py \
            --repo . \
            --repo-name "$REPO_NAME" \
            --stage validate \
            --warn \
            --workdir "$WORKDIR" \
            > /dev/null

      - name: Canary auth check
        env:
          STARK_APP_ID: ${{ secrets.STARK_APP_ID }}
          STARK_INSTALL_ID: ${{ secrets.STARK_INSTALL_ID }}
          STARK_PRIVATE_KEY_B64: ${{ secrets.STARK_PRIVATE_KEY_B64 }}
        run: |
          python - <<'PY'
          import sys
          from pathlib import Path

          sys.path.insert(0, str(Path("scripts").resolve()))
          import github_app

          token = github_app.get_token()
          if not token:
            raise SystemExit("GitHub App auth canary returned an empty token")
          print("GitHub App auth canary succeeded")
          PY

      - name: Upload audit artifacts
        uses: actions/upload-artifact@65462800fd760344b1a7b4382951275a0abb4808
        with:
          name: graph-audit-${{ github.run_id }}
          path: |
            ${{ env.WORKDIR }}/audit_report.json
            ${{ env.WORKDIR }}/validation_report.json
          if-no-files-found: error
          retention-days: 14

      - name: Open or update coverage tracking issue
        uses: actions/github-script@60a0d83039c74a4aee543508d2ffcb1c3799cdea
        with:
          script: |
            const fs = require('fs');

            const report = JSON.parse(
              fs.readFileSync(`${process.env.WORKDIR}/audit_report.json`, 'utf8')
            );
            const threshold = Number(process.env.STARK_GRAPH_COVERAGE_THRESHOLD || '80');
            const issueTitle = 'stark-graph audit: coverage drop';

            if (report.coverage_pct >= threshold) {
              core.info(`Coverage ${report.coverage_pct}% is above threshold ${threshold}%`);
              return;
            }

            const body = [
              'stark-graph scheduled audit detected a coverage drop.',
              '',
              `- Coverage: ${report.coverage_pct}%`,
              `- Threshold: ${threshold}%`,
              `- Nodes with docstrings: ${report.nodes_with_docstring}/${report.total_nodes}`,
              `- Workflow run: ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
              '',
              'Review `audit_report.json` and `validation_report.json` from the workflow artifacts before changing rollout settings.',
            ].join('\n');

            const { owner, repo } = context.repo;
            const existing = await github.rest.issues.listForRepo({
              owner,
              repo,
              state: 'open',
              creator: 'github-actions[bot]',
              per_page: 100,
            });

            const match = existing.data.find((issue) => issue.title === issueTitle);
            if (match) {
              await github.rest.issues.update({
                owner,
                repo,
                issue_number: match.number,
                body,
              });
              core.info(`Updated tracking issue #${match.number}`);
              return;
            }

            const created = await github.rest.issues.create({
              owner,
              repo,
              title: issueTitle,
              body,
            });
            core.info(`Created tracking issue #${created.data.number}`);
        env:
          STARK_GRAPH_COVERAGE_THRESHOLD: ${{ vars.STARK_GRAPH_COVERAGE_THRESHOLD }}
