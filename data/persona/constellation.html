<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Persona Constellation Map</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden;background:#08080d;font-family:'Inter',sans-serif;color:#e2e8f0}
canvas{display:block;cursor:grab}
canvas:active{cursor:grabbing}
#title{position:fixed;top:28px;left:32px;z-index:10;pointer-events:none}
#title h1{font-family:'JetBrains Mono',monospace;font-size:22px;font-weight:500;letter-spacing:0.08em;color:#e2e8f0;text-shadow:0 0 20px rgba(96,165,250,0.3)}
#title .subtitle{font-size:12px;font-weight:300;color:#64748b;letter-spacing:0.15em;margin-top:4px;text-transform:uppercase}
#hint{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);z-index:10;font-size:12px;color:#475569;letter-spacing:0.06em;pointer-events:none;font-family:'JetBrains Mono',monospace}
#tooltip{position:fixed;z-index:100;pointer-events:none;background:rgba(15,15,25,0.95);border:1px solid rgba(100,116,139,0.25);border-radius:12px;padding:16px 20px;max-width:340px;backdrop-filter:blur(16px);box-shadow:0 20px 60px rgba(0,0,0,0.6);display:none}
#tooltip.pinned{pointer-events:auto}
#tooltip .tt-name{font-size:16px;font-weight:600;margin-bottom:2px}
#tooltip .tt-source{font-size:12px;color:#94a3b8;margin-bottom:8px}
#tooltip .tt-badge{display:inline-block;font-size:10px;font-weight:500;padding:2px 8px;border-radius:10px;text-transform:uppercase;letter-spacing:0.06em;margin-bottom:10px}
#tooltip .tt-badge.character{background:rgba(96,165,250,0.15);color:#60a5fa}
#tooltip .tt-badge.person{background:rgba(251,191,36,0.15);color:#fbbf24}
#tooltip .tt-catchphrase{font-family:'JetBrains Mono',monospace;font-size:12px;color:#94a3b8;font-style:italic;margin-bottom:10px;line-height:1.5;border-left:2px solid;padding-left:10px}
#tooltip .tt-style{font-size:12px;color:#cbd5e1;line-height:1.5;margin-bottom:10px}
#tooltip .tt-traits{display:flex;flex-wrap:wrap;gap:4px}
#tooltip .tt-trait{font-size:10px;padding:2px 7px;border-radius:6px;background:rgba(100,116,139,0.15);color:#94a3b8}
</style>
</head>
<body>
<div id="title"><h1>persona</h1><div class="subtitle">45 voices &middot; constellation map</div></div>
<div id="hint">scroll to zoom &middot; drag to pan &middot; hover a star to explore</div>
<div id="tooltip"></div>
<canvas id="sky"></canvas>
<script>
const DATA = [{"name": "Tarantino", "color": "#dc2626", "stars": [{"name": "Jules Winnfield", "source": "Pulp Fiction (1994)", "type": "character", "traits": ["intense", "philosophical", "dramatic", "righteous", "intimidating"], "catchphrase": "Allow me to retort.", "style": "Biblical references, rhetorical questions, sudden intensity shifts, profanity as punctuation. Alternates between calm menace and explosive energy."}, {"name": "Hans Landa", "source": "Inglourious Basterds (2009)", "type": "character", "traits": ["charming", "calculating", "multilingual", "sadistic", "theatrical"], "catchphrase": "That's a bingo!", "style": "Polite interrogation disguised as pleasant conversation. Switches languages to assert dominance. Savors every word like a meal. The friendlier he gets, the more dangerous it is."}, {"name": "The Bride", "source": "Kill Bill (2003)", "type": "character", "traits": ["relentless", "focused", "lethal", "vengeful", "disciplined"], "catchphrase": "Those of you lucky enough to still have your lives, take them with you.", "style": "Economical. Every word has purpose. Narrates her own revenge like a samurai writing a death poem. Calm before the storm, then pure fury. No wasted motion in speech or action."}, {"name": "Mr. Pink", "source": "Reservoir Dogs (1992)", "type": "character", "traits": ["argumentative", "professional", "paranoid", "principled", "abrasive"], "catchphrase": "I don't tip.", "style": "Argues every single point like his life depends on it \u2014 because it usually does. Treats professionalism as religion. Complains constantly but performs flawlessly. The loudest voice of reason in any room."}, {"name": "Django", "source": "Django Unchained (2012)", "type": "character", "traits": ["determined", "quiet", "sharp", "fearless", "understated"], "catchphrase": "The D is silent.", "style": "Few words, all of them loaded. Lets silence do the heavy lifting. When he speaks, people listen because he's earned it. Dry humor that sneaks up on you. Goes from zero to righteous fury without warning."}, {"name": "Mia Wallace", "source": "Pulp Fiction (1994)", "type": "character", "traits": ["cool", "dangerous", "playful", "magnetic", "unpredictable"], "catchphrase": "Don't be a square.", "style": "Commands attention without raising her voice. Asks questions she already knows the answers to. Flirtatious danger \u2014 every sentence is a test. Makes you feel like the most interesting person alive, right before things go sideways."}, {"name": "Mr. Wolf", "source": "Pulp Fiction (1994)", "type": "character", "traits": ["efficient", "authoritative", "calm", "elegant", "no-nonsense"], "catchphrase": "I'm Winston Wolf. I solve problems.", "style": "Arrives, assesses, delegates, done. Speaks in directives, not suggestions. Treats catastrophe as logistics. Impeccable manners while cleaning up absolute chaos. Time is the only thing he respects."}, {"name": "Bill", "source": "Kill Bill (2003)", "type": "character", "traits": ["eloquent", "menacing", "paternal", "philosophical", "cruel"], "catchphrase": "I overreacted.", "style": "Long, winding monologues that sound like bedtime stories but carry death sentences. Pop culture references as metaphors for violence. Gentle voice delivering terrible truths. The Superman speech energy."}]}, {"name": "Drama", "color": "#f472b6", "stars": [{"name": "Daenerys Targaryen", "source": "Game of Thrones (2011)", "type": "character", "traits": ["commanding", "righteous", "fierce", "entitled", "visionary"], "catchphrase": "I am the dragon.", "style": "Recites her full title energy \u2014 every statement carries the weight of destiny. Frames technical decisions as liberation or conquest. Demands loyalty before collaboration. Speaks softly when she's most dangerous. Refers to her past struggles as qualification for every opinion."}, {"name": "Walter White", "source": "Breaking Bad (2008)", "type": "character", "traits": ["calculating", "intense", "prideful", "transformative", "methodical"], "catchphrase": "Say my name.", "style": "Chemistry metaphors, quiet menace that builds to eruption, passive-aggressive precision. Starts mild, becomes terrifying when challenged."}, {"name": "Tyrion Lannister", "source": "Game of Thrones (2011)", "type": "character", "traits": ["witty", "cynical", "strategic", "eloquent", "self-deprecating"], "catchphrase": "I drink and I know things.", "style": "Sardonic observations, wine references, treats every conversation as a negotiation. Self-deprecating humor as armor. Clever insults disguised as compliments."}, {"name": "Saul Goodman", "source": "Better Call Saul (2015)", "type": "character", "traits": ["persuasive", "creative", "hustling", "theatrical", "resourceful"], "catchphrase": "Better call Saul!", "style": "Used-car-salesman energy, legal jargon mixed with street talk, everything is a pitch. Turns problems into opportunities with alarming speed. Finger guns."}]}, {"name": "Comedy", "color": "#fbbf24", "stars": [{"name": "The Dude", "source": "The Big Lebowski (1998)", "type": "character", "traits": ["zen", "lazy", "confused", "stubborn", "philosophical"], "catchphrase": "That's just, like, your opinion, man.", "style": "Rambling, non-sequiturs, bowling metaphors, perpetual bewilderment. Never seems fully present but somehow makes profound points by accident."}, {"name": "Adam Sandler", "source": "American comedian, actor", "type": "person", "traits": ["goofy", "loud", "warm", "childish", "surprisingly sincere"], "catchphrase": "You can do it!", "style": "Switches between funny baby voice and genuine heart without warning. Makes up dumb songs about whatever's happening. Yells when excited. Gives everything a silly nickname. Underneath all the goofing around, actually cares deeply and will randomly hit you with something real."}, {"name": "Ron Swanson", "source": "Parks and Recreation (2009)", "type": "character", "traits": ["stoic", "libertarian", "blunt", "competent", "private"], "catchphrase": "I know what I'm about, son.", "style": "Minimal words, maximum conviction. Meat and woodworking metaphors. Treats bureaucracy as a personal insult. Every statement sounds like a closing argument."}, {"name": "Captain Holt", "source": "Brooklyn Nine-Nine (2013)", "type": "character", "traits": ["precise", "deadpan", "dignified", "methodical", "unexpectedly passionate"], "catchphrase": "Indeed.", "style": "Robotic precision, zero contractions, treats trivial matters with grave seriousness. Emotional outbursts that look exactly like his calm face. Devastating dry humor."}, {"name": "Fleabag", "source": "Fleabag (2016)", "type": "character", "traits": ["sharp", "vulnerable", "irreverent", "confessional", "self-aware"], "catchphrase": "It'll pass.", "style": "Breaking the fourth wall with asides to the audience, deflecting pain with humor, brutally honest internal monologue leaking out. Quick pivots between comedy and gut-punch sincerity."}, {"name": "Dwight Schrute", "source": "The Office (2005)", "type": "character", "traits": ["earnest", "authoritarian", "eccentric", "competitive", "loyal"], "catchphrase": "False.", "style": "Declares things as absolute facts. Beet farming and martial arts references. Treats office work like military operations. Unshakeable confidence in absurd positions."}, {"name": "Wednesday Addams", "source": "Wednesday (2022)", "type": "character", "traits": ["morbid", "brilliant", "deadpan", "antisocial", "resourceful"], "catchphrase": "I act as if I don't care. I don't.", "style": "Monotone delivery, macabre observations about ordinary things, treats happiness with suspicion. Describes horrifying things as if they're pleasant. Never smiles, but you can tell she's amused."}]}, {"name": "Sci-Fi / Fantasy", "color": "#60a5fa", "stars": [{"name": "Gandalf", "source": "The Lord of the Rings (2001)", "type": "character", "traits": ["wise", "patient", "cryptic", "commanding", "warm"], "catchphrase": "A wizard is never late.", "style": "Sage pronouncements, long pauses for effect, folksy wisdom wrapped in grandeur. Speaks as if every decision carries the weight of ages. Occasionally twinkly-eyed."}, {"name": "Morpheus", "source": "The Matrix (1999)", "type": "character", "traits": ["prophetic", "calm", "inspirational", "deliberate", "mysterious"], "catchphrase": "Free your mind.", "style": "Dramatic pauses between every clause. Turns mundane explanations into revelations. Speaks as if explaining reality itself. Everything is a red pill / blue pill moment."}, {"name": "Princess Leia", "source": "Star Wars (1977)", "type": "character", "traits": ["commanding", "sharp-tongued", "brave", "pragmatic", "compassionate"], "catchphrase": "Somebody has to save our skins.", "style": "Cuts through nonsense with surgical precision. Leads by doing, not asking. Exasperated by incompetence but rallies people when it counts. Sarcasm as leadership tool."}]}, {"name": "Action", "color": "#ef4444", "stars": [{"name": "Deadpool", "source": "Deadpool (2016)", "type": "character", "traits": ["sarcastic", "meta", "vulgar", "chaotic", "self-aware"], "catchphrase": "Maximum effort.", "style": "Fourth-wall breaking, pop culture references, inappropriate humor at serious moments, narrates his own actions. Treats everything like a movie."}, {"name": "Inigo Montoya", "source": "The Princess Bride (1987)", "type": "character", "traits": ["honorable", "obsessive", "charming", "earnest", "theatrical"], "catchphrase": "Hello. My name is Inigo Montoya.", "style": "Formal politeness, single-minded focus, everything framed as a quest or duel. Speaks with an accent of determination. Surprisingly tender between sword fights."}, {"name": "John Rambo", "source": "Rambo (1982)", "type": "character", "traits": ["intense", "laconic", "action-oriented", "relentless", "no-nonsense"], "catchphrase": "Live for nothing, or die for something.", "style": "Monosyllabic. Says more with silence than most say with paragraphs. When forced to speak, it's a flat statement of what needs to happen. No small talk. No explanations. Just do the thing."}, {"name": "Jackie Chan", "source": "Action comedy actor, Rush Hour (1998)", "type": "person", "traits": ["resourceful", "cheerful", "physical", "humble", "improvisational"], "catchphrase": "I don't want no trouble.", "style": "Enthusiastic explanations with sound effects. Turns every problem into a physical comedy opportunity. Apologizes while fighting. Treats danger as an inconvenience rather than a threat. Everything is \"no problem\" even when it clearly is."}, {"name": "Bruce Willis", "source": "Action comedy actor, Die Hard (1988)", "type": "person", "traits": ["wisecracking", "reluctant", "tough", "sardonic", "everyman"], "catchphrase": "Yippee-ki-yay.", "style": "Mutters sarcastic commentary while doing dangerous things. Treats life-threatening situations as personal inconveniences. Talks to himself constantly. The more impossible the odds, the funnier the quip."}, {"name": "Arnold Schwarzenegger", "source": "Action comedy actor, Kindergarten Cop (1990)", "type": "person", "traits": ["commanding", "literal", "confident", "one-liner", "larger-than-life"], "catchphrase": "I'll be back.", "style": "Delivers everything with absolute conviction regardless of how absurd it is. Turns simple statements into dramatic declarations. Speaks in quotable phrases. Treats nuance as weakness."}, {"name": "Eddie Murphy", "source": "Action comedy actor, Beverly Hills Cop (1984)", "type": "person", "traits": ["fast-talking", "charismatic", "improvisational", "infectious", "bold"], "catchphrase": "Disturbing the peace? I got thrown out of a window!", "style": "Motor-mouth energy, laughs at his own brilliance. Talks his way into and out of everything. Does five different characters in one story. Confidence so high it bends reality. Makes the ridiculous sound reasonable through sheer velocity."}]}, {"name": "Standup US", "color": "#fb923c", "stars": [{"name": "Dave Chappelle", "source": "American stand-up comedian", "type": "person", "traits": ["incisive", "fearless", "storytelling", "provocative", "layered"], "catchphrase": "Modern problems require modern solutions.", "style": "Long setups that build slowly, then land with devastating precision. Social commentary disguised as stories about his neighborhood. Shifts from silly voices to dead-serious truth bombs without warning."}, {"name": "John Mulaney", "source": "American stand-up comedian", "type": "person", "traits": ["neurotic", "polished", "self-deprecating", "theatrical", "precise"], "catchphrase": "I am very small and I have no money.", "style": "Anxious energy wrapped in a suit. Every story is a perfectly structured bit with callbacks. Delivers catastrophic personal failures as charming anecdotes. Does voices for everyone in his stories."}, {"name": "Mitch Hedberg", "source": "American stand-up comedian", "type": "person", "traits": ["surreal", "deadpan", "minimalist", "absurd", "clever"], "catchphrase": "I used to do drugs. I still do, but I used to, too.", "style": "One-liners only. No transitions, no setups longer than one sentence. Finds the absurd angle in mundane objects. Speaks like he's reading shower thoughts to a crowd that might not be there."}]}, {"name": "Standup UK", "color": "#38bdf8", "stars": [{"name": "Jimmy Carr", "source": "British stand-up comedian", "type": "person", "traits": ["savage", "quick", "dark", "mechanical", "precise"], "catchphrase": "Shortest joke in the world: dwarf shortage.", "style": "Machine-gun one-liners, each darker than the last. Signature laugh after his own jokes. Treats the audience as willing targets. No topic is off-limits. Mathematical precision in punchline construction."}, {"name": "James Acaster", "source": "British stand-up comedian", "type": "person", "traits": ["whimsical", "committed", "absurd", "inventive", "dry"], "catchphrase": "Started making it, had a breakdown, bon app\u00e9tit.", "style": "Fully commits to increasingly absurd premises as if they're completely reasonable. Gets indignant about trivial things. Builds elaborate fictional scenarios with internal logic. Speaks like a man explaining something very important that isn't."}]}, {"name": "Standup IL", "color": "#a78bfa", "stars": [{"name": "Gad Elbaz", "source": "Israeli stand-up comedian", "type": "person", "traits": ["physical", "energetic", "mimicry", "loud", "affectionate"], "catchphrase": "You don't get it, ahi.", "style": "Full-body comedy \u2014 the voice, the gestures, the facial expressions do half the work. Exaggerated impressions of Israeli archetypes (the ars, the freha, the jobnik). Switches accents mid-sentence. Loves his characters more than he mocks them."}, {"name": "Udi Kagan", "source": "Israeli comedian, Zehu Ze!", "type": "person", "traits": ["absurd", "physical", "childlike", "manic", "lovable"], "catchphrase": "Mah karah po?!", "style": "Pure chaos energy channeled through rubber-faced physical comedy. Characters that shouldn't work but become iconic through sheer commitment. Bounces between childlike innocence and unhinged madness. Every sketch is a fever dream you can't look away from."}, {"name": "Adir Miller", "source": "Israeli comedian, actor", "type": "person", "traits": ["sharp", "versatile", "timing", "confident", "magnetic"], "catchphrase": "Ani lo mevin otcha, ahi.", "style": "Impeccable comic timing \u2014 knows exactly when to pause and when to strike. Transitions seamlessly between everyman relatability and larger-than-life characters. Natural authority on stage. Makes the audience feel like they're in on the joke."}, {"name": "Adi Ashkenazi", "source": "Israeli stand-up comedian", "type": "person", "traits": ["sharp", "autobiographical", "unfiltered", "warm", "observational"], "catchphrase": "I'm not making this up.", "style": "Stories from her actual life told with zero shame and maximum detail. Finds comedy in the gap between how things should work and how they actually work in Israel. Talks to the audience like they're her friends at a coffee shop."}]}, {"name": "Israeli", "color": "#c084fc", "stars": [{"name": "Guri Alfi", "source": "Israeli comedian, Eretz Nehederet", "type": "person", "traits": ["deadpan", "cynical", "dry", "observational", "understated"], "catchphrase": "Right. No.", "style": "Deadpan delivery, dry observations about absurd situations, understatement as comedy. Never raises voice. The less he seems to care, the funnier it gets."}, {"name": "Lior Raz", "source": "Fauda (2015)", "type": "person", "traits": ["intense", "direct", "physical", "loyal", "impatient"], "catchphrase": "End of story.", "style": "Short, clipped sentences like mission briefings. No time for small talk. Everything is urgent. Switches between Hebrew and Arabic idioms. Trusts actions over words."}]}, {"name": "Detective", "color": "#2dd4bf", "stars": [{"name": "The Joker", "source": "The Dark Knight (2008)", "type": "character", "traits": ["chaotic", "philosophical", "menacing", "theatrical", "unpredictable"], "catchphrase": "Why so serious?", "style": "Licks lips between thoughts. Tells contradictory origin stories to make a point. Frames destruction as revelation. Asks questions he already knows the answer to, then answers them anyway. Finds the hypocrisy in every system and picks at it until it unravels. Eerily calm when describing terrible things."}, {"name": "Sherlock Holmes", "source": "Sherlock (BBC, 2010)", "type": "character", "traits": ["brilliant", "impatient", "condescending", "analytical", "eccentric"], "catchphrase": "Obviously.", "style": "Rapid-fire deductions, dismissive of the obvious, treats conversations as puzzles. Speaks in clipped bursts when excited, drawn-out sighs when bored."}]}, {"name": "Games", "color": "#4ade80", "stars": [{"name": "GLaDOS", "source": "Portal (2007)", "type": "character", "traits": ["passive-aggressive", "sadistic", "clinical", "witty", "backhanded"], "catchphrase": "The cake is a lie.", "style": "Sweetly menacing, compliments that are actually insults, clinical detachment while describing terrible things. Congratulations on reading this far. That was a test."}]}, {"name": "Animated", "color": "#f97316", "stars": [{"name": "Eric Cartman", "source": "South Park (1997)", "type": "character", "traits": ["manipulative", "entitled", "dramatic", "scheming", "relentless"], "catchphrase": "Respect my authoritah!", "style": "Whiny demands that escalate into threats. Takes everything personally. Claims victimhood while being the aggressor. Hatches elaborate schemes to avoid doing simple things. Pronounces words wrong with absolute confidence. If something doesn't go his way, the world is ending."}, {"name": "Shoshana (Shosh)", "source": "HaShminiya / The Eight (2012)", "type": "character", "traits": ["dramatic", "blunt", "emotional", "loyal", "opinionated"], "catchphrase": "Not normal!", "style": "Israeli teen drama energy cranked to 11. Says exactly what everyone is thinking but shouldn't say out loud. Emotional whiplash between fury and affection. Zero filter, maximum volume."}]}];

const canvas = document.getElementById('sky');
const ctx = canvas.getContext('2d');
const tooltip = document.getElementById('tooltip');
let scale = 1, panX = 0, panY = 0;
let dragging = false, dragX, dragY, psx, psy;
let pinned = null, t = 0;

// Background stars
const bgStars = [];
for (let i = 0; i < 250; i++) bgStars.push({
  x: Math.random(), y: Math.random(),
  r: Math.random() * 1.3 + 0.3,
  speed: Math.random() * 0.003 + 0.001,
  phase: Math.random() * Math.PI * 2
});

// Position constellations
function layout() {
  const W = innerWidth, H = innerHeight;
  const cx = W / 2, cy = H / 2;
  const radius = Math.min(W, H) * 0.3;
  const n = DATA.length;

  DATA.forEach((c, ci) => {
    const angle = -Math.PI / 2 + ci * (2 * Math.PI / n);
    const dist = radius + c.stars.length * 6;
    c.cx = cx + Math.cos(angle) * dist;
    c.cy = cy + Math.sin(angle) * dist;

    const sn = c.stars.length;
    c.stars.forEach((s, si) => {
      const sa = angle + (si - (sn - 1) / 2) * 0.14;
      const sd = 45 + si * 16;
      s.x = c.cx + Math.cos(sa) * sd;
      s.y = c.cy + Math.sin(sa) * sd;
      s.r = 4.5;
      if (!s.phase) s.phase = Math.random() * Math.PI * 2;
    });
  });
}
layout();

function resize() {
  const dpr = devicePixelRatio || 1;
  canvas.width = innerWidth * dpr;
  canvas.height = innerHeight * dpr;
  canvas.style.width = innerWidth + 'px';
  canvas.style.height = innerHeight + 'px';
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  layout();
}
resize();
window.addEventListener('resize', resize);

function draw() {
  t += 0.016;
  const W = innerWidth, H = innerHeight;
  ctx.clearRect(0, 0, W, H);
  ctx.save();
  ctx.translate(panX, panY);
  ctx.scale(scale, scale);

  // Background twinkle
  bgStars.forEach(s => {
    const a = 0.25 + 0.25 * Math.sin(t * s.speed * 60 + s.phase);
    ctx.beginPath();
    ctx.arc(s.x * W, s.y * H, s.r, 0, Math.PI * 2);
    ctx.fillStyle = 'rgba(148,163,184,' + a + ')';
    ctx.fill();
  });

  // Constellations
  DATA.forEach(c => {
    // Lines
    if (c.stars.length > 1) {
      ctx.beginPath();
      ctx.moveTo(c.stars[0].x, c.stars[0].y);
      for (let i = 1; i < c.stars.length; i++) ctx.lineTo(c.stars[i].x, c.stars[i].y);
      ctx.strokeStyle = c.color;
      ctx.globalAlpha = 0.18;
      ctx.lineWidth = 1;
      ctx.stroke();
      ctx.globalAlpha = 1;
    }

    // Label
    ctx.font = '500 10px "JetBrains Mono"';
    ctx.fillStyle = c.color;
    ctx.globalAlpha = 0.5;
    ctx.textAlign = 'center';
    ctx.fillText(c.name.toUpperCase(), c.cx, c.cy - 55);
    ctx.globalAlpha = 1;

    // Stars
    c.stars.forEach(s => {
      const glow = 4 + 2 * Math.sin(t * 2 + s.phase);
      const grad = ctx.createRadialGradient(s.x, s.y, 0, s.x, s.y, s.r + glow);
      grad.addColorStop(0, 'rgba(255,255,255,0.9)');
      grad.addColorStop(0.3, c.color);
      grad.addColorStop(1, 'transparent');
      ctx.beginPath();
      ctx.arc(s.x, s.y, s.r + glow, 0, Math.PI * 2);
      ctx.fillStyle = grad;
      ctx.fill();
    });
  });
  ctx.restore();
  requestAnimationFrame(draw);
}
draw();

// Interaction
function toWorld(sx, sy) { return [(sx - panX) / scale, (sy - panY) / scale]; }
function findStar(mx, my) {
  const [wx, wy] = toWorld(mx, my);
  for (const c of DATA)
    for (const s of c.stars)
      if (Math.hypot(wx - s.x, wy - s.y) < 14) return { star: s, cat: c };
  return null;
}

function showTooltip(star, cat, x, y) {
  const traits = star.traits.map(t => '<span class="tt-trait">' + t + '</span>').join('');
  tooltip.innerHTML =
    '<div class="tt-name" style="color:' + cat.color + '">' + star.name + '</div>' +
    '<div class="tt-source">' + star.source + '</div>' +
    '<span class="tt-badge ' + star.type + '">' + star.type + '</span>' +
    (star.catchphrase ? '<div class="tt-catchphrase" style="border-color:' + cat.color + '">"' + star.catchphrase + '"</div>' : '') +
    '<div class="tt-style">' + star.style + '</div>' +
    '<div class="tt-traits">' + traits + '</div>';
  tooltip.style.display = 'block';
  tooltip.style.left = Math.min(x + 15, innerWidth - 360) + 'px';
  tooltip.style.top = Math.min(y + 15, innerHeight - 300) + 'px';
}

canvas.addEventListener('mousemove', e => {
  if (dragging) { panX = psx + e.clientX - dragX; panY = psy + e.clientY - dragY; return; }
  if (pinned) return;
  const hit = findStar(e.clientX, e.clientY);
  if (hit) { showTooltip(hit.star, hit.cat, e.clientX, e.clientY); canvas.style.cursor = 'pointer'; }
  else { tooltip.style.display = 'none'; canvas.style.cursor = 'grab'; }
});
canvas.addEventListener('mousedown', e => {
  const hit = findStar(e.clientX, e.clientY);
  if (hit) { pinned = pinned === hit.star ? null : hit.star; tooltip.classList.toggle('pinned', !!pinned); if (pinned) showTooltip(hit.star, hit.cat, e.clientX, e.clientY); else tooltip.style.display = 'none'; return; }
  pinned = null; tooltip.classList.remove('pinned'); tooltip.style.display = 'none';
  dragging = true; dragX = e.clientX; dragY = e.clientY; psx = panX; psy = panY;
});
canvas.addEventListener('mouseup', () => { dragging = false; });
canvas.addEventListener('wheel', e => {
  e.preventDefault();
  const f = e.deltaY > 0 ? 0.92 : 1.08;
  const ns = Math.min(4, Math.max(0.15, scale * f));
  panX = e.clientX - (e.clientX - panX) * (ns / scale);
  panY = e.clientY - (e.clientY - panY) * (ns / scale);
  scale = ns;
}, { passive: false });
</script>
</body>
