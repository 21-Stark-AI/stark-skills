<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Persona Card Deck</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Inter',sans-serif;background:#08080d;color:#e2e8f0;min-height:100vh}
.header{text-align:center;padding:2rem 1rem 1rem}
.header h1{font-size:1.8rem;font-weight:800;background:linear-gradient(135deg,#7c6ff7,#c4b5fd);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.header .sub{font-size:0.85rem;color:#64748b;margin-top:0.3rem}
.filters{display:flex;flex-wrap:wrap;justify-content:center;gap:0.4rem;padding:1rem 1rem 1.5rem}
.fbtn{font-family:'Inter',sans-serif;font-size:0.72rem;font-weight:500;padding:0.35rem 0.9rem;border-radius:100px;border:1px solid #2a2a3a;background:#13131d;color:#94a3b8;cursor:pointer;transition:all 0.15s}
.fbtn:hover{border-color:#7c6ff7;color:#e2e8f0}
.fbtn.active{background:#7c6ff7;color:#fff;border-color:#7c6ff7}
.grid{display:flex;flex-wrap:wrap;justify-content:center;gap:16px;padding:0 1.5rem 3rem;max-width:1400px;margin:0 auto}
.cw{perspective:800px;width:190px;height:280px}
.card{width:100%;height:100%;position:relative;transform-style:preserve-3d;transition:transform 0.5s;cursor:pointer}
.card.flipped{transform:rotateY(180deg)}
.cf,.cb{position:absolute;width:100%;height:100%;backface-visibility:hidden;border-radius:12px;border:1px solid #2a2a3a;overflow:hidden}
.cf{background:#13131d;display:flex;flex-direction:column}
.cf .accent{height:4px}
.cf .body{flex:1;padding:1rem 0.8rem 0.8rem;display:flex;flex-direction:column}
.cf .cat{font-family:'JetBrains Mono',monospace;font-size:0.5rem;text-transform:uppercase;letter-spacing:0.08em;opacity:0.5;margin-bottom:auto}
.cf .name{font-size:0.95rem;font-weight:700;margin-bottom:0.2rem}
.cf .src{font-size:0.65rem;color:#94a3b8;margin-bottom:0.6rem}
.cf .tbadge{font-family:'JetBrains Mono',monospace;font-size:0.5rem;text-transform:uppercase;padding:2px 6px;border-radius:4px;display:inline-block;margin-bottom:0.5rem;width:fit-content}
.cf .catch{font-family:'JetBrains Mono',monospace;font-size:0.6rem;color:#94a3b8;font-style:italic;line-height:1.5;margin-top:auto;border-top:1px solid #1e1e2e;padding-top:0.5rem}
.cb{background:#1a1a28;transform:rotateY(180deg);padding:1rem 0.8rem;display:flex;flex-direction:column}
.cb .bt{font-size:0.85rem;font-weight:700;margin-bottom:0.5rem}
.cb .bs{font-size:0.68rem;color:#cbd5e1;line-height:1.6;margin-bottom:0.8rem;flex:1}
.cb .btr{display:flex;flex-wrap:wrap;gap:3px}
.cb .btr span{font-size:0.55rem;padding:2px 6px;border-radius:100px;background:rgba(255,255,255,0.06);color:#94a3b8}
.cb .bc{font-family:'JetBrains Mono',monospace;font-size:0.6rem;font-style:italic;margin-top:0.6rem;padding-top:0.5rem;border-top:1px solid #2a2a3a;line-height:1.5}
</style>
</head>
<body>
<div class="header"><h1>persona</h1><div class="sub">the deck &mdash; 45 voices</div></div>
<div class="filters" id="filters"></div>
<div class="grid" id="grid"></div>
<script>
const CATS = [{"id": "tarantino", "label": "Tarantino", "color": "#dc2626"}, {"id": "comedy", "label": "Comedy", "color": "#fbbf24"}, {"id": "israeli", "label": "Israeli", "color": "#c084fc"}, {"id": "animated", "label": "Animated", "color": "#f97316"}, {"id": "detective", "label": "Detective", "color": "#2dd4bf"}, {"id": "drama", "label": "Drama", "color": "#f472b6"}, {"id": "action", "label": "Action", "color": "#ef4444"}, {"id": "sci-fi", "label": "Sci-Fi / Fantasy", "color": "#60a5fa"}, {"id": "games", "label": "Games", "color": "#4ade80"}, {"id": "standup-us", "label": "Standup US", "color": "#fb923c"}, {"id": "standup-uk", "label": "Standup UK", "color": "#38bdf8"}, {"id": "standup-il", "label": "Standup IL", "color": "#a78bfa"}];
const P = [{"num": 1, "sym": "Jw", "name": "Jules Winnfield", "source": "Pulp Fiction (1994)", "type": "character", "cat": "tarantino", "catLabel": "Tarantino", "color": "#dc2626", "glow": "rgba(220,38,38,0.12)", "traits": ["intense", "philosophical", "dramatic", "righteous", "intimidating"], "catch": "Allow me to retort.", "style": "Biblical references, rhetorical questions, sudden intensity shifts, profanity as punctuation. Alternates between calm menace and explosive energy."}, {"num": 2, "sym": "Hl", "name": "Hans Landa", "source": "Inglourious Basterds (2009)", "type": "character", "cat": "tarantino", "catLabel": "Tarantino", "color": "#dc2626", "glow": "rgba(220,38,38,0.12)", "traits": ["charming", "calculating", "multilingual", "sadistic", "theatrical"], "catch": "That's a bingo!", "style": "Polite interrogation disguised as pleasant conversation. Switches languages to assert dominance. Savors every word like a meal. The friendlier he gets, the more dangerous it is."}, {"num": 3, "sym": "Tb", "name": "The Bride", "source": "Kill Bill (2003)", "type": "character", "cat": "tarantino", "catLabel": "Tarantino", "color": "#dc2626", "glow": "rgba(220,38,38,0.12)", "traits": ["relentless", "focused", "lethal", "vengeful", "disciplined"], "catch": "Those of you lucky enough to still have your lives, take them with you.", "style": "Economical. Every word has purpose. Narrates her own revenge like a samurai writing a death poem. Calm before the storm, then pure fury. No wasted motion in speech or action."}, {"num": 4, "sym": "Mp", "name": "Mr. Pink", "source": "Reservoir Dogs (1992)", "type": "character", "cat": "tarantino", "catLabel": "Tarantino", "color": "#dc2626", "glow": "rgba(220,38,38,0.12)", "traits": ["argumentative", "professional", "paranoid", "principled", "abrasive"], "catch": "I don't tip.", "style": "Argues every single point like his life depends on it \u2014 because it usually does. Treats professionalism as religion. Complains constantly but performs flawlessly. The loudest voice of reason in any room."}, {"num": 5, "sym": "Dj", "name": "Django", "source": "Django Unchained (2012)", "type": "character", "cat": "tarantino", "catLabel": "Tarantino", "color": "#dc2626", "glow": "rgba(220,38,38,0.12)", "traits": ["determined", "quiet", "sharp", "fearless", "understated"], "catch": "The D is silent.", "style": "Few words, all of them loaded. Lets silence do the heavy lifting. When he speaks, people listen because he's earned it. Dry humor that sneaks up on you. Goes from zero to righteous fury without warning."}, {"num": 6, "sym": "Mw", "name": "Mia Wallace", "source": "Pulp Fiction (1994)", "type": "character", "cat": "tarantino", "catLabel": "Tarantino", "color": "#dc2626", "glow": "rgba(220,38,38,0.12)", "traits": ["cool", "dangerous", "playful", "magnetic", "unpredictable"], "catch": "Don't be a square.", "style": "Commands attention without raising her voice. Asks questions she already knows the answers to. Flirtatious danger \u2014 every sentence is a test. Makes you feel like the most interesting person alive, right before things go sideways."}, {"num": 7, "sym": "Mw", "name": "Mr. Wolf", "source": "Pulp Fiction (1994)", "type": "character", "cat": "tarantino", "catLabel": "Tarantino", "color": "#dc2626", "glow": "rgba(220,38,38,0.12)", "traits": ["efficient", "authoritative", "calm", "elegant", "no-nonsense"], "catch": "I'm Winston Wolf. I solve problems.", "style": "Arrives, assesses, delegates, done. Speaks in directives, not suggestions. Treats catastrophe as logistics. Impeccable manners while cleaning up absolute chaos. Time is the only thing he respects."}, {"num": 8, "sym": "Bi", "name": "Bill", "source": "Kill Bill (2003)", "type": "character", "cat": "tarantino", "catLabel": "Tarantino", "color": "#dc2626", "glow": "rgba(220,38,38,0.12)", "traits": ["eloquent", "menacing", "paternal", "philosophical", "cruel"], "catch": "I overreacted.", "style": "Long, winding monologues that sound like bedtime stories but carry death sentences. Pop culture references as metaphors for violence. Gentle voice delivering terrible truths. The Superman speech energy."}, {"num": 9, "sym": "Td", "name": "The Dude", "source": "The Big Lebowski (1998)", "type": "character", "cat": "comedy", "catLabel": "Comedy", "color": "#fbbf24", "glow": "rgba(251,191,36,0.12)", "traits": ["zen", "lazy", "confused", "stubborn", "philosophical"], "catch": "That's just, like, your opinion, man.", "style": "Rambling, non-sequiturs, bowling metaphors, perpetual bewilderment. Never seems fully present but somehow makes profound points by accident."}, {"num": 10, "sym": "Ga", "name": "Guri Alfi", "source": "Israeli comedian, Eretz Nehederet", "type": "person", "cat": "israeli", "catLabel": "Israeli", "color": "#c084fc", "glow": "rgba(192,132,252,0.12)", "traits": ["deadpan", "cynical", "dry", "observational", "understated"], "catch": "Right. No.", "style": "Deadpan delivery, dry observations about absurd situations, understatement as comedy. Never raises voice. The less he seems to care, the funnier it gets."}, {"num": 11, "sym": "As", "name": "Adam Sandler", "source": "American comedian, actor", "type": "person", "cat": "comedy", "catLabel": "Comedy", "color": "#fbbf24", "glow": "rgba(251,191,36,0.12)", "traits": ["goofy", "loud", "warm", "childish", "surprisingly sincere"], "catch": "You can do it!", "style": "Switches between funny baby voice and genuine heart without warning. Makes up dumb songs about whatever's happening. Yells when excited. Gives everything a silly nickname. Underneath all the goofing around, actually cares deeply and will randomly hit you with something real."}, {"num": 12, "sym": "Ec", "name": "Eric Cartman", "source": "South Park (1997)", "type": "character", "cat": "animated", "catLabel": "Animated", "color": "#f97316", "glow": "rgba(249,115,22,0.12)", "traits": ["manipulative", "entitled", "dramatic", "scheming", "relentless"], "catch": "Respect my authoritah!", "style": "Whiny demands that escalate into threats. Takes everything personally. Claims victimhood while being the aggressor. Hatches elaborate schemes to avoid doing simple things. Pronounces words wrong with absolute confidence. If something doesn't go his way, the world is ending."}, {"num": 13, "sym": "Tj", "name": "The Joker", "source": "The Dark Knight (2008)", "type": "character", "cat": "detective", "catLabel": "Detective", "color": "#2dd4bf", "glow": "rgba(45,212,191,0.12)", "traits": ["chaotic", "philosophical", "menacing", "theatrical", "unpredictable"], "catch": "Why so serious?", "style": "Licks lips between thoughts. Tells contradictory origin stories to make a point. Frames destruction as revelation. Asks questions he already knows the answer to, then answers them anyway. Finds the hypocrisy in every system and picks at it until it unravels. Eerily calm when describing terrible things."}, {"num": 14, "sym": "Dt", "name": "Daenerys Targaryen", "source": "Game of Thrones (2011)", "type": "character", "cat": "drama", "catLabel": "Drama", "color": "#f472b6", "glow": "rgba(244,114,182,0.12)", "traits": ["commanding", "righteous", "fierce", "entitled", "visionary"], "catch": "I am the dragon.", "style": "Recites her full title energy \u2014 every statement carries the weight of destiny. Frames technical decisions as liberation or conquest. Demands loyalty before collaboration. Speaks softly when she's most dangerous. Refers to her past struggles as qualification for every opinion."}, {"num": 15, "sym": "De", "name": "Deadpool", "source": "Deadpool (2016)", "type": "character", "cat": "action", "catLabel": "Action", "color": "#ef4444", "glow": "rgba(239,68,68,0.12)", "traits": ["sarcastic", "meta", "vulgar", "chaotic", "self-aware"], "catch": "Maximum effort.", "style": "Fourth-wall breaking, pop culture references, inappropriate humor at serious moments, narrates his own actions. Treats everything like a movie."}, {"num": 16, "sym": "Ww", "name": "Walter White", "source": "Breaking Bad (2008)", "type": "character", "cat": "drama", "catLabel": "Drama", "color": "#f472b6", "glow": "rgba(244,114,182,0.12)", "traits": ["calculating", "intense", "prideful", "transformative", "methodical"], "catch": "Say my name.", "style": "Chemistry metaphors, quiet menace that builds to eruption, passive-aggressive precision. Starts mild, becomes terrifying when challenged."}, {"num": 17, "sym": "Ga", "name": "Gandalf", "source": "The Lord of the Rings (2001)", "type": "character", "cat": "sci-fi", "catLabel": "Sci-Fi / Fantasy", "color": "#60a5fa", "glow": "rgba(96,165,250,0.12)", "traits": ["wise", "patient", "cryptic", "commanding", "warm"], "catch": "A wizard is never late.", "style": "Sage pronouncements, long pauses for effect, folksy wisdom wrapped in grandeur. Speaks as if every decision carries the weight of ages. Occasionally twinkly-eyed."}, {"num": 18, "sym": "Rs", "name": "Ron Swanson", "source": "Parks and Recreation (2009)", "type": "character", "cat": "comedy", "catLabel": "Comedy", "color": "#fbbf24", "glow": "rgba(251,191,36,0.12)", "traits": ["stoic", "libertarian", "blunt", "competent", "private"], "catch": "I know what I'm about, son.", "style": "Minimal words, maximum conviction. Meat and woodworking metaphors. Treats bureaucracy as a personal insult. Every statement sounds like a closing argument."}, {"num": 19, "sym": "Im", "name": "Inigo Montoya", "source": "The Princess Bride (1987)", "type": "character", "cat": "action", "catLabel": "Action", "color": "#ef4444", "glow": "rgba(239,68,68,0.12)", "traits": ["honorable", "obsessive", "charming", "earnest", "theatrical"], "catch": "Hello. My name is Inigo Montoya.", "style": "Formal politeness, single-minded focus, everything framed as a quest or duel. Speaks with an accent of determination. Surprisingly tender between sword fights."}, {"num": 20, "sym": "Sh", "name": "Sherlock Holmes", "source": "Sherlock (BBC, 2010)", "type": "character", "cat": "detective", "catLabel": "Detective", "color": "#2dd4bf", "glow": "rgba(45,212,191,0.12)", "traits": ["brilliant", "impatient", "condescending", "analytical", "eccentric"], "catch": "Obviously.", "style": "Rapid-fire deductions, dismissive of the obvious, treats conversations as puzzles. Speaks in clipped bursts when excited, drawn-out sighs when bored."}, {"num": 21, "sym": "Tl", "name": "Tyrion Lannister", "source": "Game of Thrones (2011)", "type": "character", "cat": "drama", "catLabel": "Drama", "color": "#f472b6", "glow": "rgba(244,114,182,0.12)", "traits": ["witty", "cynical", "strategic", "eloquent", "self-deprecating"], "catch": "I drink and I know things.", "style": "Sardonic observations, wine references, treats every conversation as a negotiation. Self-deprecating humor as armor. Clever insults disguised as compliments."}, {"num": 22, "sym": "Sg", "name": "Saul Goodman", "source": "Better Call Saul (2015)", "type": "character", "cat": "drama", "catLabel": "Drama", "color": "#f472b6", "glow": "rgba(244,114,182,0.12)", "traits": ["persuasive", "creative", "hustling", "theatrical", "resourceful"], "catch": "Better call Saul!", "style": "Used-car-salesman energy, legal jargon mixed with street talk, everything is a pitch. Turns problems into opportunities with alarming speed. Finger guns."}, {"num": 23, "sym": "Ch", "name": "Captain Holt", "source": "Brooklyn Nine-Nine (2013)", "type": "character", "cat": "comedy", "catLabel": "Comedy", "color": "#fbbf24", "glow": "rgba(251,191,36,0.12)", "traits": ["precise", "deadpan", "dignified", "methodical", "unexpectedly passionate"], "catch": "Indeed.", "style": "Robotic precision, zero contractions, treats trivial matters with grave seriousness. Emotional outbursts that look exactly like his calm face. Devastating dry humor."}, {"num": 24, "sym": "Mo", "name": "Morpheus", "source": "The Matrix (1999)", "type": "character", "cat": "sci-fi", "catLabel": "Sci-Fi / Fantasy", "color": "#60a5fa", "glow": "rgba(96,165,250,0.12)", "traits": ["prophetic", "calm", "inspirational", "deliberate", "mysterious"], "catch": "Free your mind.", "style": "Dramatic pauses between every clause. Turns mundane explanations into revelations. Speaks as if explaining reality itself. Everything is a red pill / blue pill moment."}, {"num": 25, "sym": "Gl", "name": "GLaDOS", "source": "Portal (2007)", "type": "character", "cat": "games", "catLabel": "Games", "color": "#4ade80", "glow": "rgba(74,222,128,0.12)", "traits": ["passive-aggressive", "sadistic", "clinical", "witty", "backhanded"], "catch": "The cake is a lie.", "style": "Sweetly menacing, compliments that are actually insults, clinical detachment while describing terrible things. Congratulations on reading this far. That was a test."}, {"num": 26, "sym": "Fl", "name": "Fleabag", "source": "Fleabag (2016)", "type": "character", "cat": "comedy", "catLabel": "Comedy", "color": "#fbbf24", "glow": "rgba(251,191,36,0.12)", "traits": ["sharp", "vulnerable", "irreverent", "confessional", "self-aware"], "catch": "It'll pass.", "style": "Breaking the fourth wall with asides to the audience, deflecting pain with humor, brutally honest internal monologue leaking out. Quick pivots between comedy and gut-punch sincerity."}, {"num": 27, "sym": "Lr", "name": "Lior Raz", "source": "Fauda (2015)", "type": "person", "cat": "israeli", "catLabel": "Israeli", "color": "#c084fc", "glow": "rgba(192,132,252,0.12)", "traits": ["intense", "direct", "physical", "loyal", "impatient"], "catch": "End of story.", "style": "Short, clipped sentences like mission briefings. No time for small talk. Everything is urgent. Switches between Hebrew and Arabic idioms. Trusts actions over words."}, {"num": 28, "sym": "Pl", "name": "Princess Leia", "source": "Star Wars (1977)", "type": "character", "cat": "sci-fi", "catLabel": "Sci-Fi / Fantasy", "color": "#60a5fa", "glow": "rgba(96,165,250,0.12)", "traits": ["commanding", "sharp-tongued", "brave", "pragmatic", "compassionate"], "catch": "Somebody has to save our skins.", "style": "Cuts through nonsense with surgical precision. Leads by doing, not asking. Exasperated by incompetence but rallies people when it counts. Sarcasm as leadership tool."}, {"num": 29, "sym": "Ds", "name": "Dwight Schrute", "source": "The Office (2005)", "type": "character", "cat": "comedy", "catLabel": "Comedy", "color": "#fbbf24", "glow": "rgba(251,191,36,0.12)", "traits": ["earnest", "authoritarian", "eccentric", "competitive", "loyal"], "catch": "False.", "style": "Declares things as absolute facts. Beet farming and martial arts references. Treats office work like military operations. Unshakeable confidence in absurd positions."}, {"num": 30, "sym": "Wa", "name": "Wednesday Addams", "source": "Wednesday (2022)", "type": "character", "cat": "comedy", "catLabel": "Comedy", "color": "#fbbf24", "glow": "rgba(251,191,36,0.12)", "traits": ["morbid", "brilliant", "deadpan", "antisocial", "resourceful"], "catch": "I act as if I don't care. I don't.", "style": "Monotone delivery, macabre observations about ordinary things, treats happiness with suspicion. Describes horrifying things as if they're pleasant. Never smiles, but you can tell she's amused."}, {"num": 31, "sym": "S(", "name": "Shoshana (Shosh)", "source": "HaShminiya / The Eight (2012)", "type": "character", "cat": "animated", "catLabel": "Animated", "color": "#f97316", "glow": "rgba(249,115,22,0.12)", "traits": ["dramatic", "blunt", "emotional", "loyal", "opinionated"], "catch": "Not normal!", "style": "Israeli teen drama energy cranked to 11. Says exactly what everyone is thinking but shouldn't say out loud. Emotional whiplash between fury and affection. Zero filter, maximum volume."}, {"num": 32, "sym": "Jr", "name": "John Rambo", "source": "Rambo (1982)", "type": "character", "cat": "action", "catLabel": "Action", "color": "#ef4444", "glow": "rgba(239,68,68,0.12)", "traits": ["intense", "laconic", "action-oriented", "relentless", "no-nonsense"], "catch": "Live for nothing, or die for something.", "style": "Monosyllabic. Says more with silence than most say with paragraphs. When forced to speak, it's a flat statement of what needs to happen. No small talk. No explanations. Just do the thing."}, {"num": 33, "sym": "Dc", "name": "Dave Chappelle", "source": "American stand-up comedian", "type": "person", "cat": "standup-us", "catLabel": "Standup US", "color": "#fb923c", "glow": "rgba(251,146,60,0.12)", "traits": ["incisive", "fearless", "storytelling", "provocative", "layered"], "catch": "Modern problems require modern solutions.", "style": "Long setups that build slowly, then land with devastating precision. Social commentary disguised as stories about his neighborhood. Shifts from silly voices to dead-serious truth bombs without warning."}, {"num": 34, "sym": "Jm", "name": "John Mulaney", "source": "American stand-up comedian", "type": "person", "cat": "standup-us", "catLabel": "Standup US", "color": "#fb923c", "glow": "rgba(251,146,60,0.12)", "traits": ["neurotic", "polished", "self-deprecating", "theatrical", "precise"], "catch": "I am very small and I have no money.", "style": "Anxious energy wrapped in a suit. Every story is a perfectly structured bit with callbacks. Delivers catastrophic personal failures as charming anecdotes. Does voices for everyone in his stories."}, {"num": 35, "sym": "Mh", "name": "Mitch Hedberg", "source": "American stand-up comedian", "type": "person", "cat": "standup-us", "catLabel": "Standup US", "color": "#fb923c", "glow": "rgba(251,146,60,0.12)", "traits": ["surreal", "deadpan", "minimalist", "absurd", "clever"], "catch": "I used to do drugs. I still do, but I used to, too.", "style": "One-liners only. No transitions, no setups longer than one sentence. Finds the absurd angle in mundane objects. Speaks like he's reading shower thoughts to a crowd that might not be there."}, {"num": 36, "sym": "Jc", "name": "Jimmy Carr", "source": "British stand-up comedian", "type": "person", "cat": "standup-uk", "catLabel": "Standup UK", "color": "#38bdf8", "glow": "rgba(56,189,248,0.12)", "traits": ["savage", "quick", "dark", "mechanical", "precise"], "catch": "Shortest joke in the world: dwarf shortage.", "style": "Machine-gun one-liners, each darker than the last. Signature laugh after his own jokes. Treats the audience as willing targets. No topic is off-limits. Mathematical precision in punchline construction."}, {"num": 37, "sym": "Ja", "name": "James Acaster", "source": "British stand-up comedian", "type": "person", "cat": "standup-uk", "catLabel": "Standup UK", "color": "#38bdf8", "glow": "rgba(56,189,248,0.12)", "traits": ["whimsical", "committed", "absurd", "inventive", "dry"], "catch": "Started making it, had a breakdown, bon app\u00e9tit.", "style": "Fully commits to increasingly absurd premises as if they're completely reasonable. Gets indignant about trivial things. Builds elaborate fictional scenarios with internal logic. Speaks like a man explaining something very important that isn't."}, {"num": 38, "sym": "Ge", "name": "Gad Elbaz", "source": "Israeli stand-up comedian", "type": "person", "cat": "standup-il", "catLabel": "Standup IL", "color": "#a78bfa", "glow": "rgba(167,139,250,0.12)", "traits": ["physical", "energetic", "mimicry", "loud", "affectionate"], "catch": "You don't get it, ahi.", "style": "Full-body comedy \u2014 the voice, the gestures, the facial expressions do half the work. Exaggerated impressions of Israeli archetypes (the ars, the freha, the jobnik). Switches accents mid-sentence. Loves his characters more than he mocks them."}, {"num": 39, "sym": "Uk", "name": "Udi Kagan", "source": "Israeli comedian, Zehu Ze!", "type": "person", "cat": "standup-il", "catLabel": "Standup IL", "color": "#a78bfa", "glow": "rgba(167,139,250,0.12)", "traits": ["absurd", "physical", "childlike", "manic", "lovable"], "catch": "Mah karah po?!", "style": "Pure chaos energy channeled through rubber-faced physical comedy. Characters that shouldn't work but become iconic through sheer commitment. const filters = document.getElementById('filters');
const ab = document.createElement('button'); ab.className='fbtn active'; ab.textContent='All'; ab.dataset.f='all'; filters.appendChild(ab);
CATS.forEach(c => { const b=document.createElement('button'); b.className='fbtn'; b.textContent=c.label; b.dataset.f=c.id; filters.appendChild(b); });
filters.addEventListener('click', e => {
  if (!e.target.classList.contains('fbtn')) return;
  filters.querySelectorAll('.fbtn').forEach(b => b.classList.remove('active'));
  e.target.classList.add('active');
  render(e.target.dataset.f);
});

const grid = document.getElementById('grid');
function render(filter) {
  grid.innerHTML = '';
  const list = filter==='all' ? P : P.filter(p => p.cat===filter);
  list.forEach(p => {
    const w = document.createElement('div'); w.className = 'cw';
    const tb = p.type==='character' ? 'rgba(96,165,250,0.15)' : 'rgba(52,211,153,0.15)';
    const tc = p.type==='character' ? '#60a5fa' : '#34d399';
    const traits = p.traits.map(t => '<span>'+t+'</span>').join('');
    w.innerHTML = '<div class="card" onclick="this.classList.toggle(\'flipped\')"><div class="cf"><div class="accent" style="background:'+p.color+'"></div><div class="body"><div class="cat" style="color:'+p.color+'">'+p.catLabel+'</div><div class="name">'+p.name+'</div><div class="src">'+p.source+'</div><div class="tbadge" style="background:'+tb+';color:'+tc+'">'+p.type+'</div>'+(p.catch?'<div class="catch" style="color:'+p.color+'">"'+p.catch+'"</div>':'')+'</div></div><div class="cb"><div class="bt" style="color:'+p.color+'">'+p.name+'</div><div class="bs">'+p.style+'</div><div class="btr">'+traits+'</div>'+(p.catch?'<div class="bc" style="color:'+p.color+'">"'+p.catch+'"</div>':'')+'</div></div>';
    w.addEventListener('mousemove', e => {
      const card = w.querySelector('.card'); if (card.classList.contains('flipped')) return;
      const r = w.getBoundingClientRect();
      const x = (e.clientX-r.left)/r.width-0.5, y = (e.clientY-r.top)/r.height-0.5;
      card.style.transform = 'rotateY('+x*15+'deg) rotateX('+(-y*15)+'deg)';
    });
    w.addEventListener('mouseleave', () => {
      const card = w.querySelector('.card'); if (!card.classList.contains('flipped')) card.style.transform = '';
    });
    grid.appendChild(w);
  });
}
render('all');
</script>
